<VirtualHost *:80>
    ServerName turboturn.local

    # Sirve el frontend estático
    DocumentRoot /home/moreno2006/Turboturn/frontend
    <Directory /home/moreno2006/Turboturn/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proxy al backend FastAPI (uvicorn en puerto 8000)
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    # Proxy para Swagger UI
    ProxyPass /docs http://127.0.0.1:8000/docs
    ProxyPassReverse /docs http://127.0.0.1:8000/docs
    ProxyPass /openapi.json http://127.0.0.1:8000/openapi.json
    ProxyPassReverse /openapi.json http://127.0.0.1:8000/openapi.json

    ErrorLog ${APACHE_LOG_DIR}/turboturn_error.log
    CustomLog ${APACHE_LOG_DIR}/turboturn_access.log combined
</VirtualHost>
