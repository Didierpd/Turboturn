<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Taller - TurboTurn</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="navbar">
      <h2>TurboTurn — Taller</h2>
      <div class="nav-links">
        <a class="active" href="./panel-taller.html">Agenda</a>
        <a href="#" id="btnSalir">Salir</a>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <h1 id="bienvenida">Panel del Taller</h1>
        <p style="color:#64748b;">Gestiona tu agenda, citas y clientes.</p>
      </div>

      <div class="grid">
        <div class="info-box">
          <h3>Citas de hoy</h3>
          <p id="citasHoy" style="font-size:2rem;font-weight:bold;color:#1d4ed8;">-</p>
        </div>
        <div class="info-box">
          <h3>Pendientes</h3>
          <p id="citasPendientes" style="font-size:2rem;font-weight:bold;color:#f59e0b;">-</p>
        </div>
        <div class="info-box">
          <h3>Completadas</h3>
          <p id="citasCompletadas" style="font-size:2rem;font-weight:bold;color:#16a34a;">-</p>
        </div>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Agenda — citas asignadas</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Fecha / Hora</th>
                <th>Cliente</th>
                <th>Vehículo</th>
                <th>Notas</th>
                <th>Estado</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="agendaBody">
              <tr><td colspan="6" style="text-align:center;color:#64748b;">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="footer-note">TurboTurn - Plataforma de gestión de turnos para talleres</div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/taller.js"></script>
  <script>
    const usuario = JSON.parse(localStorage.getItem("usuario"));
    if (!usuario || usuario.rol !== "taller") { window.location.href = "./login.html"; }
    document.getElementById("bienvenida").textContent = "Bienvenido, " + usuario.nombre;
    document.getElementById("btnSalir").addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.removeItem("usuario");
      window.location.href = "./login.html";
    });
    cargarAgendaTaller();
  </script>
</body>
</html>
