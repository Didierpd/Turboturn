<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TurboTurn</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="navbar">
      <h2>TurboTurn</h2>
      <div class="nav-links">
        <a href="../index.html">Inicio</a>
      </div>
    </div>

    <div class="container">
      <div class="card" style="max-width: 500px; margin: 40px auto;">
        <h1>Iniciar sesión</h1>
        <p style="margin-bottom: 20px; color: #64748b;">
          Accede a la plataforma para gestionar tus citas y vehículos.
        </p>

        <form id="loginForm">
          <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" placeholder="ejemplo@correo.com" required />
          </div>

          <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" placeholder="********" required />
          </div>

          <button type="submit" class="btn-submit">Ingresar</button>
        </form>

        <div id="loginAlert" class="alert"></div>
      </div>
    </div>

    <div class="footer-note">
      TurboTurn - Plataforma de gestión de turnos para talleres
    </div>
  </div>

  <script src="../js/app.js?v=2"></script>
</body>
</html>
