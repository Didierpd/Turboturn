<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehículos - TurboTurn</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="navbar">
      <h2>TurboTurn</h2>
      <div class="nav-links">
        <a href="./pantalladeInicio.html">Inicio</a>
        <a href="./citas.html">Citas</a>
        <a class="active" href="./vehiculos.html">Vehículos</a>
        <a href="./servicios.html">Servicios</a>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <h1>Registrar vehículo</h1>

        <form id="vehiculoForm">
          <div class="form-group">
            <label for="tipo_vehiculo">Tipo de vehículo</label>
            <select id="tipo_vehiculo" required>
              <option value="">Selecciona un tipo</option>
              <option value="carro">Carro</option>
              <option value="moto">Moto</option>
            </select>
          </div>

          <div class="form-group">
            <label for="marca">Marca</label>
            <input type="text" id="marca" placeholder="Ej: Mazda" required />
          </div>

          <div class="form-group">
            <label for="anio">Año</label>
            <input type="number" id="anio" placeholder="Ej: 2020" required />
          </div>

          <div class="form-group">
            <label for="placa">Placa</label>
            <input type="text" id="placa" placeholder="Ej: ABC123" required />
          </div>

          <div class="form-group">
            <label for="color">Color</label>
            <input type="text" id="color" placeholder="Ej: Rojo" />
          </div>

          <button type="submit" class="btn-submit">Guardar vehículo</button>
        </form>

        <div id="vehiculoAlert" class="alert"></div>
      </div>

      <div class="card">
        <h2>Vehículos registrados</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Marca</th>
                <th>Año</th>
                <th>Placa</th>
                <th>Color</th>
              </tr>
            </thead>
            <tbody id="vehiculosBody">
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="../js/app.js"></script>
  </div>
</body>
</html>
