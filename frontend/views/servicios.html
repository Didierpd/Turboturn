<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servicios - TurboTurn</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="navbar">
      <h2>TurboTurn</h2>
      <div class="nav-links">
        <a href="./pantalladeInicio.html">Inicio</a>
        <a href="./citas.html">Citas</a>
        <a href="./vehiculos.html">Vehículos</a>
        <a class="active" href="./servicios.html">Servicios</a>
        <a href="./historial.html">Historial</a>
        <a href="#" id="btnSalir">Salir</a>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <h1>Servicios disponibles</h1>
        <p style="color:#64748b; margin-bottom:20px;">Servicios ofrecidos por el taller.</p>
        <div class="grid" id="serviciosGrid">
          <p style="color:#64748b;">Cargando servicios...</p>
        </div>
      </div>
    </div>

    <div class="footer-note">TurboTurn - Plataforma de gestión de turnos para talleres</div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const usuario = JSON.parse(localStorage.getItem("usuario"));
    if (!usuario) { window.location.href = "./login.html"; }
    document.getElementById("btnSalir").addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.removeItem("usuario");
      window.location.href = "./login.html";
    });

    async function cargarServicios() {
      const grid = document.getElementById("serviciosGrid");
      try {
        const res = await fetch("http://localhost:8000/api/servicios/");
        const servicios = await res.json();
        if (servicios.length === 0) {
          grid.innerHTML = "<p style='color:#64748b;'>No hay servicios registrados.</p>";
          return;
        }
        grid.innerHTML = servicios.map(s => `
          <div class="info-box">
            <h3>${s.nombre}</h3>
            <p>${s.descripcion || ""}</p>
            <strong style="color:#1d4ed8;">$${Number(s.precio).toLocaleString("es-CO")}</strong>
          </div>
        `).join("");
      } catch (err) {
        grid.innerHTML = "<p style='color:#dc2626;'>Error al cargar servicios.</p>";
      }
    }
    cargarServicios();
  </script>
</body>
</html>
