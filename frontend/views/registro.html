<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - TurboTurn</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="navbar">
      <h2>TurboTurn</h2>
      <div class="nav-links">
        <a href="../index.html">Inicio</a>
        <a href="./login.html">Iniciar sesión</a>
      </div>
    </div>

    <div class="container">
      <div class="card" style="max-width: 500px; margin: 40px auto;">
        <h1>Crear cuenta</h1>
        <p style="margin-bottom: 20px; color: #64748b;">
          Regístrate como usuario o taller mecánico.
        </p>

        <form id="registroForm">
          <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre" required />
          </div>

          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com" required />
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="3001234567" />
          </div>

          <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" placeholder="********" required />
          </div>

          <div class="form-group">
            <label for="rol">Tipo de cuenta</label>
            <select id="rol" required>
              <option value="usuario">Usuario</option>
              <option value="taller">Taller mecánico</option>
            </select>
          </div>

          <div id="avisoTaller" style="display:none; margin-bottom:16px; padding:12px; background:#fef3c7; border-left:4px solid #f59e0b; border-radius:8px; color:#92400e; font-size:0.9rem;">
            Los talleres requieren aprobación del administrador antes de poder ingresar.
          </div>

          <button type="submit" class="btn-submit">Registrarse</button>
        </form>

        <div id="registroAlert" class="alert"></div>

        <p style="margin-top:20px; text-align:center; color:#64748b;">
          ¿Ya tienes cuenta? <a href="./login.html" style="color:#1d4ed8;">Inicia sesión</a>
        </p>
      </div>
    </div>

    <div class="footer-note">
      TurboTurn - Plataforma de gestión de turnos para talleres
    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
