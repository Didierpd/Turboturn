<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citas - TurboTurn</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="page">
    <div class="navbar">
      <h2>TurboTurn</h2>
      <div class="hamburger" onclick="this.nextElementSibling.classList.toggle('open')"><span></span><span></span><span></span></div>
      <div class="nav-links">
        <a href="./pantalladeInicio.html">Inicio</a>
        <a class="active" href="./citas.html">Citas</a>
        <a href="./vehiculos.html">Vehículos</a>
        <a href="./servicios.html">Servicios</a>
        <a href="./historial.html">Historial</a>
        <a href="#" id="btnSalir">Salir</a>
      </div>
    </div>

    <div class="container">
      <div class="card">
        <h1>Reservar cita</h1>

        <form id="citaForm">
          <div class="form-group">
            <label for="taller">Taller</label>
            <select id="taller" required>
              <option value="">Selecciona un taller</option>
            </select>
          </div>

          <div class="form-group">
            <label for="vehiculo">Vehículo</label>
            <select id="vehiculo" required>
              <option value="">Selecciona un vehículo</option>
            </select>
          </div>

          <div class="form-group">
            <label for="fecha">Fecha y hora</label>
            <input type="datetime-local" id="fecha" required />
          </div>

          <div class="form-group">
            <label for="notas">Notas adicionales</label>
            <textarea id="notas" rows="3" placeholder="Describe el problema o servicio que necesitas..."></textarea>
          </div>

          <button type="submit" class="btn-submit">Reservar cita</button>
        </form>

        <div id="citaAlert" class="alert"></div>
      </div>

      <div class="card">
        <h2>Mis citas</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Fecha / Hora</th>
                <th>Vehículo</th>
                <th>Estado</th>
                <th>Notas</th>
              </tr>
            </thead>
            <tbody id="citasBody">
              <tr><td colspan="4" style="text-align:center;color:#64748b;">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="footer-note">TurboTurn - Plataforma de gestión de turnos para talleres</div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    const usuario = JSON.parse(localStorage.getItem("usuario"));
    if (!usuario) { window.location.href = "./login.html"; }
    document.getElementById("btnSalir").addEventListener("click", function(e) {
      e.preventDefault();
      localStorage.removeItem("usuario");
      window.location.href = "./login.html";
    });
  </script>
</body>
</html>
